<p-dialog
  [visible]="visible()"
  [closable]="false"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [showHeader]="false"
  styleClass="neubrutal-dialog w-[90vw] max-w-[350px] !border-4 !border-black !rounded-3xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]"
>
  <div class="text-center pt-10 pb-4">
    <div class="text-6xl mb-6 animate-bounce inline-block">📢</div>
    <h2 class="text-3xl font-black mb-2 uppercase tracking-tighter leading-none">Tempo Scaduto!</h2>
    <p class="font-bold text-slate-500 mb-8 italic text-lg leading-tight">
      Passa il telefono al Team
      <span class="text-purple-600 uppercase font-black italic">{{ nextTeam() }}</span>
    </p>
    <button
      (click)="onNextTurn.emit()"
      class="w-full bg-yellow-400 border-3 border-black py-5 rounded-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-black uppercase text-xl italic active:shadow-none active:translate-x-1 active:translate-y-1 transition-all"
    >
      Inizia ora! 🚀
    </button>
  </div>
</p-dialog>
