<p-dialog
  [visible]="visible()"
  (onHide)="onClose.emit()"
  [modal]="true"
  header="IMPOSTAZIONI"
  styleClass="neubrutal-dialog w-[90vw] max-w-[400px] !border-4 !border-black"
>
  <div class="flex flex-col gap-6 py-4">
    <div>
      <label class="font-black uppercase text-[10px] mb-3 block tracking-widest text-slate-500"
        >Lingua</label
      >
      <div class="grid grid-cols-2 gap-3">
        <button
          (click)="onLangChange.emit('it')"
          [class]="lang() === 'it' ? 'bg-purple-500 text-white' : 'bg-white'"
          class="border-3 border-black p-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-0.5 active:translate-y-0.5"
        >
          <span class="text-l uppercase">Ita</span>
        </button>
        <button
          (click)="onLangChange.emit('en')"
          [class]="lang() === 'en' ? 'bg-purple-500 text-white' : 'bg-white'"
          class="border-3 border-black p-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-0.5 active:translate-y-0.5"
        >
          <span class="text-l uppercase">Eng</span>
        </button>
      </div>
    </div>

    <hr class="border-2 border-black/5" />

    <div>
      <label class="font-black uppercase text-[10px] mb-3 block tracking-widest text-slate-500"
        >Feedback</label
      >
      <div class="grid grid-cols-3 gap-3">
        <button
          (click)="onFeedbackChange.emit('all')"
          title="Suono e Vibrazione"
          [class]="mode() === 'all' ? 'bg-purple-500 text-white' : 'bg-white'"
          class="border-3 border-black h-14 rounded-xl transition-all flex items-center justify-center shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-0.5 active:translate-y-0.5"
        >
          <i class="pi pi-volume-up text-xl"></i>
        </button>

        <button
          (click)="onFeedbackChange.emit('vibration')"
          title="Solo Vibrazione"
          [class]="mode() === 'vibration' ? 'bg-purple-500 text-white' : 'bg-white'"
          class="border-3 border-black h-14 rounded-xl transition-all flex items-center justify-center shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-0.5 active:translate-y-0.5"
        >
          <i class="pi pi-mobile text-xl rotate-12"></i>
        </button>

        <button
          (click)="onFeedbackChange.emit('none')"
          title="Disattivato"
          [class]="mode() === 'none' ? 'bg-purple-500 text-white' : 'bg-white'"
          class="border-3 border-black h-14 rounded-xl transition-all flex items-center justify-center shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-0.5 active:translate-y-0.5"
        >
          <i class="pi pi-bell-slash text-xl"></i>
        </button>
      </div>
    </div>

    <hr class="border-2 border-black/5" />

    <button
      (click)="onReset.emit()"
      class="w-full bg-red-500 text-white border-3 border-black py-4 rounded-2xl font-black uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1 transition-all flex items-center justify-center gap-2"
    >
      <i class="pi pi-refresh"></i>
      Reset Partita
    </button>
  </div>
</p-dialog>
