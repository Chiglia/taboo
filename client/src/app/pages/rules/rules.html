<div class="flex items-center justify-center min-h-screen bg-amber-400 p-6 overflow-hidden">
  <div
    class="max-w-md w-full bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] rounded-3xl p-8 transform -rotate-1 relative overflow-hidden"
  >
    @if (countdown() === null) {
      <div class="animate-fade-in">
        <h1 class="text-5xl font-black text-purple-600 mb-6 tracking-tighter italic">TABOO!</h1>

        <div class="space-y-4 mb-8 text-lg font-bold text-slate-800">
          <div class="flex items-center gap-3 bg-blue-100 p-3 rounded-2xl border-2 border-black">
            <span class="text-2xl">👥</span> Due squadre: A vs B
          </div>
          <div class="flex items-center gap-3 bg-green-100 p-3 rounded-2xl border-2 border-black">
            <span class="text-2xl">🚫</span> No parole proibite
          </div>
          <div class="flex items-center gap-3 bg-pink-100 p-3 rounded-2xl border-2 border-black">
            <span class="text-2xl">⏱️</span> 60 secondi di fuoco
          </div>
        </div>

        <button
          (click)="startCountdown()"
          class="w-full bg-purple-600 text-white border-4 border-black py-4 rounded-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-x-1 active:translate-y-1 active:shadow-none transition-all cursor-pointer"
        >
          <span class="text-2xl font-black uppercase italic">GIOCA ORA! 🚀</span>
        </button>
      </div>

    } @else {
      <div class="flex flex-col items-center justify-center py-12 animate-scale-in">
        <div
          class="text-[10rem] font-black text-black italic drop-shadow-[6px_6px_0px_rgba(147,51,234,0.3)] leading-none"
        >
          {{ countdown() === 0 ? 'VIA!' : countdown() }}
        </div>
        <p class="mt-4 font-black text-purple-600 uppercase italic animate-pulse">Preparatevi...</p>
      </div>
    }
  </div>
</div>
