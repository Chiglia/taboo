<div class="h-full max-w-md mx-auto flex flex-col gap-4">
  <div class="flex items-center gap-3 shrink-0">
    <div class="flex-1 flex gap-2">
      <div
        class="flex-1 border-3 border-black p-2 rounded-xl shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] text-center transition-all duration-300"
        [class]="turn() === 'A' ? 'bg-purple-500 text-white scale-105' : 'bg-white opacity-60'"
      >
        <span class="block text-[10px] font-black uppercase tracking-tighter">Team A</span>
        <span class="text-xl font-black">{{ points().A }}</span>
      </div>
      <div
        class="flex-1 border-3 border-black p-2 rounded-xl shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] text-center transition-all duration-300"
        [class]="turn() === 'B' ? 'bg-purple-500 text-white scale-105' : 'bg-white opacity-60'"
      >
        <span class="block text-[10px] font-black uppercase tracking-tighter">Team B</span>
        <span class="text-xl font-black">{{ points().B }}</span>
      </div>
    </div>

    <button
      (click)="showSettings.set(true)"
      class="w-12 h-12 border-3 border-black rounded-xl bg-white shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-0.5 active:translate-y-0.5 transition-all flex items-center justify-center"
    >
      <i class="pi pi-cog text-2xl"></i>
    </button>

    <div
      class="w-16 h-16 shrink-0 rounded-full border-3 border-black flex items-center justify-center shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] transition-colors duration-200 font-black font-mono text-xl"
      [class.bg-red-500]="timeLeft() < 10"
      [class.text-white]="timeLeft() < 10"
      [class.bg-white]="timeLeft() >= 10"
      [class.animate-pulse]="timeLeft() < 10 && timeLeft() > 0"
    >
      {{ timeLeft() }}
    </div>
  </div>

  <div class="flex-1 relative min-h-0">
    <div
      class="absolute inset-0 bg-black rounded-3xl translate-x-1.5 translate-y-1.5 transition-colors duration-200"
      [class.!bg-red-700]="isShowingError()"
      [class.!bg-green-700]="isShowingSuccess()"
    ></div>

    <div
      #card
      class="relative h-full bg-white border-4 border-black rounded-3xl p-6 flex flex-col overflow-hidden opacity-0 card-animate"
      [class.opacity-100]="currentCard()"
      [class.animate-shake]="isShowingError()"
      [class.animate-success]="isShowingSuccess()"
    >
      @if (currentCard()) {
        @if (isShowingSuccess()) {
          <div
            class="absolute inset-0 bg-green-500 opacity-60 z-20 pointer-events-none animate-fade-in"
          ></div>
          <div class="absolute inset-0 flex items-center justify-center z-30 pointer-events-none">
            <i
              class="pi pi-check text-white text-[10rem] drop-shadow-[4px_4px_0px_rgba(0,0,0,1)] animate-scale-in"
            ></i>
          </div>
        }

        @if (isShowingError()) {
          <div
            class="absolute inset-0 bg-red-500 opacity-60 z-20 pointer-events-none animate-fade-in"
          ></div>
          <div class="absolute inset-0 flex items-center justify-center z-30 pointer-events-none">
            <i
              class="pi pi-times text-white text-[10rem] drop-shadow-[4px_4px_0px_rgba(0,0,0,1)] animate-scale-in"
            ></i>
          </div>
        }

        <div
          class="flex flex-col h-full transition-opacity duration-150"
          [class.opacity-10]="isAnimating()"
        >
          <div class="text-center mb-4 shrink-0">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block"
              >Indovina:</span
            >
            <h2 class="text-3xl font-black text-purple-600 uppercase mt-1">
              {{ currentCard()?.word }}
            </h2>
          </div>

          <div class="flex-1 flex flex-col justify-center gap-2 overflow-y-auto py-2">
            <p class="text-[10px] font-black text-center text-red-500 uppercase mb-1">
              Vietato dire:
            </p>
            @for (f of currentCard()?.forbidden; track f) {
              <div class="bg-slate-100 border-2 border-black/5 rounded-xl py-3 px-4 text-center">
                <span class="text-lg font-bold text-slate-700 uppercase leading-tight">{{
                  f
                }}</span>
              </div>
            }
          </div>

          <div class="flex gap-2 mt-4 shrink-0 items-end">
            <button
              (click)="handleWord(false)"
              class="flex-1 bg-red-500 border-3 border-black py-4 rounded-xl shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all font-black text-white uppercase italic text-sm"
            >
              Errore!
            </button>
            <button
              (click)="skipWord()"
              [disabled]="skipsLeft() === 0"
              class="flex-1 bg-amber-400 border-3 border-black py-3 rounded-xl shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all font-black text-black uppercase italic disabled:opacity-50 disabled:bg-slate-300 disabled:shadow-none"
            >
              <span class="block text-[10px] leading-none">Salta</span>
              <span class="text-lg">{{ skipsLeft() }}</span>
            </button>
            <button
              (click)="handleWord(true)"
              class="flex-1 bg-green-500 border-3 border-black py-4 rounded-xl shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-x-0.5 active:translate-y-0.5 active:shadow-none transition-all font-black text-white uppercase italic text-sm"
            >
              Sì!
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</div>

<app-settings
  [visible]="showSettings()"
  [mode]="feedbackMode()"
  [lang]="language()"
  (onFeedbackChange)="feedbackMode.set($event)"
  (onLangChange)="language.set($any($event))"
  (onClose)="showSettings.set(false)"
  (onReset)="resetGame()"
></app-settings>

<app-game-over
  [visible]="isOver()"
  [nextTeam]="turn() === 'A' ? 'B' : 'A'"
  (onNextTurn)="nextTurn()"
></app-game-over>
